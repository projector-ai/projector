<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projector — Visor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        :root {
            --bg-page: #0a0a0f;
            --bg-sidebar: #111118;
            --bg-hover: #1a1a28;
            --bg-active: #252536;
            --bg-card: #141420;
            --bg-code: #161624;
            --bg-popup: #1a1a28;
            --border: #222236;
            --border-hover: #333350;
            --text-primary: #e8e8f0;
            --text-secondary: #8a8a9a;
            --text-muted: #55556a;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --accent-bg: rgba(108, 92, 231, 0.12);
            --success: #00d2a0;
            --success-bg: rgba(0, 210, 160, 0.1);
            --warning: #ffa726;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --radius: 10px;
            --sidebar-w: 260px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            --transition: 150ms ease;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.8;
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-back {
            font-size: 11px;
            color: var(--text-muted);
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }

        .sidebar-back:hover {
            color: var(--accent-light);
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .sidebar-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Progress */
        .sidebar-progress {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .progress-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: var(--bg-hover);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Nav */
        .sidebar-nav {
            flex: 1;
            padding: 8px 0;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition);
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-bg);
            color: var(--accent-light);
            font-weight: 600;
        }

        .nav-step {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            flex-shrink: 0;
            background: var(--bg-hover);
            color: var(--text-muted);
        }

        .nav-step.completed {
            background: var(--success-bg);
            color: var(--success);
        }

        .sidebar-meta {
            padding: 10px 16px;
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            border-top: 1px solid var(--border);
        }

        /* ── MAIN ── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            min-width: 0;
        }

        .doc-wrapper {
            max-width: 860px;
            margin: 0 auto;
            padding: 48px 40px 100px;
        }

        /* ── MARKDOWN RENDERED CONTENT ── */
        .md-content h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .md-content h2 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-top: 48px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            scroll-margin-top: 24px;
        }

        .md-content h3 {
            font-size: 17px;
            font-weight: 700;
            margin-top: 28px;
            margin-bottom: 10px;
            color: var(--accent-light);
        }

        .md-content p {
            margin-bottom: 14px;
            color: var(--text-secondary);
        }

        .md-content a {
            color: var(--accent-light);
            text-decoration: none;
        }

        .md-content a:hover {
            text-decoration: underline;
        }

        .md-content strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .md-content em {
            color: var(--text-muted);
        }

        .md-content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 40px 0;
        }

        .md-content ul,
        .md-content ol {
            padding-left: 24px;
            margin-bottom: 14px;
            color: var(--text-secondary);
        }

        .md-content li {
            margin-bottom: 4px;
        }

        .md-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 12px 16px;
            margin: 16px 0;
            background: var(--accent-bg);
            border-radius: 0 var(--radius) var(--radius) 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .md-content blockquote strong {
            color: var(--text-primary);
        }

        /* Tables */
        .md-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 13px;
        }

        .md-content th {
            text-align: left;
            padding: 10px 14px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: var(--bg-card);
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .md-content td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .md-content tr:hover td {
            background: var(--bg-hover);
        }

        /* Code */
        .md-content code {
            font-family: var(--font-mono);
            font-size: 0.88em;
            background: var(--bg-code);
            padding: 2px 7px;
            border-radius: 4px;
            color: var(--accent-light);
        }

        .md-content pre {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
            margin: 16px 0;
        }

        .md-content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }

        /* Mermaid diagrams */
        .mermaid-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin: 16px 0;
            overflow: auto;
        }

        .mermaid-wrapper svg {
            max-width: 100%;
        }

        /* ── LIGHT MODE ── */
        body.light-mode {
            --bg-page: #ffffff;
            --bg-sidebar: #f7f8fa;
            --bg-hover: #f0f1f4;
            --bg-active: #e8e9f0;
            --bg-card: #f4f5f7;
            --bg-code: #f7f8fa;
            --bg-popup: #ffffff;
            --border: #e3e4e8;
            --border-hover: #d0d1d8;
            --text-primary: #1a1a2e;
            --text-secondary: #5a5a72;
            --text-muted: #8e8ea0;
            --accent-bg: rgba(108, 92, 231, 0.08);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        body.light-mode .mermaid-wrapper {
            background: #fafafc;
        }

        /* ── SOFT MODE ── */
        body.soft-mode {
            --bg-page: #f5f0e8;
            --bg-sidebar: #ece7de;
            --bg-hover: #e4dfd5;
            --bg-active: #dbd5ca;
            --bg-card: #efe9e0;
            --bg-code: #ece7de;
            --bg-popup: #f5f0e8;
            --border: #d5cfc4;
            --border-hover: #c5bfb4;
            --text-primary: #4a4237;
            --text-secondary: #6e6459;
            --text-muted: #9a8f82;
            --accent: #7c6f5e;
            --accent-light: #8b7e6a;
            --accent-bg: rgba(124, 111, 94, 0.1);
            --success: #6b8f71;
            --success-bg: rgba(107, 143, 113, 0.1);
            --shadow: 0 4px 12px rgba(74, 66, 55, 0.08);
        }

        /* Theme toggle */
        #theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-sidebar);
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: all 0.15s ease;
        }

        #theme-toggle:hover {
            transform: scale(1.1);
            color: var(--text-primary);
        }

        /* Refresh hint */
        .refresh-hint {
            position: fixed;
            bottom: 20px;
            right: 76px;
            z-index: 1000;
            padding: 8px 16px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-muted);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all var(--transition);
        }

        .refresh-hint:hover {
            color: var(--accent-light);
            border-color: var(--accent);
        }

        /* Scroll */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        @media print {

            .sidebar,
            #theme-toggle,
            .refresh-hint {
                display: none;
            }

            .main {
                margin-left: 0;
            }
        }

        /* Sub/sup styling */
        .md-content sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Diagram fullscreen */
        .mermaid-wrapper {
            position: relative;
        }

        .diagram-expand {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-sidebar);
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition);
            z-index: 5;
        }

        .mermaid-wrapper:hover .diagram-expand {
            opacity: 1;
        }

        .diagram-expand:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .diagram-fullscreen-overlay {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.15s ease;
        }

        .diagram-fullscreen-overlay svg {
            max-width: 90vw;
            max-height: 85vh;
        }

        .diagram-fullscreen-close {
            position: absolute;
            top: 20px;
            right: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-sidebar);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .diagram-fullscreen-close:hover {
            background: var(--bg-hover);
        }

        .diagram-fullscreen-title {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ── CONTEXT MENU ── */
        .ctx-menu {
            position: fixed;
            z-index: 2000;
            background: var(--bg-popup);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px;
            box-shadow: var(--shadow);
            min-width: 200px;
            display: none;
        }

        .ctx-menu.visible {
            display: block;
        }

        .ctx-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: var(--font-sans);
            transition: background var(--transition);
        }

        .ctx-item:hover {
            background: var(--bg-hover);
        }

        .ctx-item-icon {
            width: 18px;
            text-align: center;
            font-size: 14px;
        }

        .ctx-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 6px;
        }

        /* ── COMMENT POPUP ── */
        .comment-popup {
            position: fixed;
            z-index: 2001;
            background: var(--bg-popup);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            width: 340px;
            display: none;
        }

        .comment-popup.visible {
            display: block;
        }

        .popup-quote {
            font-size: 12px;
            color: var(--text-muted);
            border-left: 2px solid var(--accent);
            padding: 6px 10px;
            margin-bottom: 12px;
            max-height: 60px;
            overflow: hidden;
            font-style: italic;
        }

        .popup-textarea {
            width: 100%;
            height: 80px;
            resize: vertical;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 13px;
            outline: none;
        }

        .popup-textarea:focus {
            border-color: var(--accent);
        }

        .popup-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .popup-btn {
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: var(--font-sans);
        }

        .popup-btn-cancel {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .popup-btn-primary {
            background: var(--accent);
            color: #fff;
        }

        /* ── COMMENTS PANEL ── */
        .comments-panel {
            position: fixed;
            top: 0;
            right: -380px;
            width: 380px;
            height: 100vh;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            z-index: 50;
            transition: right 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        .comments-panel.open {
            right: 0;
        }

        .comments-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .comments-panel-header h3 {
            font-size: 15px;
            font-weight: 700;
        }

        .panel-close {
            border: none;
            background: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .comments-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 16px;
            font-size: 13px;
        }

        .comment-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 10px;
        }

        .comment-card-quote {
            font-size: 11px;
            color: var(--text-muted);
            border-left: 2px solid var(--accent);
            padding: 4px 8px;
            margin-bottom: 8px;
            font-style: italic;
            max-height: 40px;
            overflow: hidden;
        }

        .comment-card-text {
            font-size: 13px;
            color: var(--text-primary);
        }

        .comment-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 10px;
            color: var(--text-muted);
        }

        .comment-card-phase {
            background: var(--accent-bg);
            color: var(--accent-light);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .comment-delete {
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
        }

        .comment-delete:hover {
            color: var(--warning);
        }

        /* Sidebar comments button */
        .sidebar-comments-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: calc(100% - 32px);
            margin: 8px 16px;
            padding: 8px 12px;
            border-radius: 8px;
            background: var(--accent-bg);
            border: 1px solid rgba(108, 92, 231, 0.2);
            color: var(--accent-light);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
        }

        .sidebar-comments-btn:hover {
            background: rgba(108, 92, 231, 0.2);
        }

        .comment-count-badge {
            background: var(--warning);
            color: #fff;
            padding: 0 6px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            margin-left: auto;
            min-width: 18px;
            text-align: center;
        }

        /* Comment highlight on text */
        .comment-highlight {
            background: rgba(255, 179, 0, 0.15);
            border-bottom: 2px solid var(--warning);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="../../index.html" class="sidebar-back">← Volver al Dashboard</a>
            <div class="sidebar-title" id="sidebar-title">Cargando...</div>
            <div class="sidebar-subtitle">Documento Técnico · SDLC</div>
        </div>
        <div class="sidebar-progress">
            <div class="progress-label">Progreso</div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar" style="width:0%"></div>
            </div>
            <div class="progress-text"><span id="progress-count">0</span> de 9 fases</div>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div style="padding:0 16px 8px">
            <button class="sidebar-comments-btn" id="toggle-comments">💬 Comentarios <span class="comment-count-badge"
                    id="comment-count-badge">0</span></button>
        </div>
        <div class="sidebar-meta">📐 Projector · Antigravity</div>
    </aside>

    <!-- Context Menu -->
    <div class="ctx-menu" id="ctx-menu">
        <button class="ctx-item" data-action="comment"><span class="ctx-item-icon">💬</span>Agregar comentario</button>
        <button class="ctx-item" data-action="copy"><span class="ctx-item-icon">📋</span>Copiar texto</button>
    </div>

    <!-- Comment Popup -->
    <div class="comment-popup" id="comment-popup">
        <div class="popup-quote" id="popup-quote"></div>
        <textarea class="popup-textarea" id="popup-textarea" placeholder="Escribe tu comentario..."></textarea>
        <div class="popup-actions">
            <button class="popup-btn popup-btn-cancel" id="popup-cancel">Cancelar</button>
            <button class="popup-btn popup-btn-primary" id="popup-save">Guardar</button>
        </div>
    </div>

    <!-- Comments Panel -->
    <div class="comments-panel" id="comments-panel">
        <div class="comments-panel-header">
            <h3>💬 Comentarios</h3><button class="panel-close" id="close-comments">✕</button>
        </div>
        <div class="comments-list" id="comments-list">
            <div class="comments-empty">No hay comentarios aún.<br><small>Selecciona texto y haz clic derecho para
                    comentar.</small></div>
        </div>
    </div>

    <main class="main">
        <div class="doc-wrapper">
            <div class="md-content" id="md-content">
                <p style="color:var(--text-muted);text-align:center;padding:60px 0">Cargando documento...</p>
            </div>
        </div>
    </main>

    <button id="theme-toggle" title="Cambiar tema">🌙</button>
    <div class="refresh-hint" id="refresh-hint" title="Live reload activo">
        <span class="live-dot"></span> Live
    </div>
    <style>
        .live-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            margin-right: 4px;
            vertical-align: middle;
            animation: pulse 2s infinite;
        }

        .live-dot.paused {
            background: var(--text-muted);
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(0, 210, 160, 0.4);
            }

            50% {
                opacity: 0.6;
                box-shadow: 0 0 0 6px rgba(0, 210, 160, 0);
            }
        }
    </style>

    <script src="content.js"></script>
    <script>
        // ── Theme toggle ──
        (function () {
            var btn = document.getElementById('theme-toggle');
            var themes = ['dark', 'light', 'soft'], icons = ['☀️', '🌿', '🌙'], cls = ['', 'light-mode', 'soft-mode'];
            var cur = 0;
            var stored = localStorage.getItem('projector-theme');
            if (stored === 'light') cur = 1; else if (stored === 'soft') cur = 2;
            function apply() {
                document.body.classList.remove('light-mode', 'soft-mode');
                if (cls[cur]) document.body.classList.add(cls[cur]);
                btn.textContent = icons[cur];
                localStorage.setItem('projector-theme', themes[cur]);
            }
            apply();
            btn.onclick = function () { cur = (cur + 1) % 3; apply(); renderMermaid(); };
        })();

        // ── Render Markdown ──
        function renderDocument() {
            var md = window.__MD_CONTENT;
            if (!md) {
                document.getElementById('md-content').innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:60px 0">No se encontró content.js<br><small>Regenera con: <code>bash init.sh --sync</code></small></p>';
                return;
            }

            // Use marked.use() for modern API (v12+)
            marked.use({
                breaks: true,
                gfm: true,
                renderer: {
                    code: function (obj) {
                        var code, lang;
                        if (typeof obj === 'object' && obj !== null) {
                            code = obj.text || obj.raw || '';
                            lang = obj.lang || '';
                        } else {
                            code = String(obj);
                            lang = arguments[1] || '';
                        }
                        if (lang === 'mermaid') {
                            return '<div class="mermaid-wrapper"><button class="diagram-expand" title="Pantalla completa">⛶</button><pre class="mermaid">' + code + '</pre></div>';
                        }
                        return '<pre><code class="language-' + (lang || '') + '">' + escapeHtml(code) + '</code></pre>';
                    }
                }
            });

            var html = marked.parse(md);
            document.getElementById('md-content').innerHTML = html;

            // Extract title from first H1
            var h1 = document.querySelector('.md-content h1');
            if (h1) {
                document.getElementById('sidebar-title').textContent = h1.textContent;
                document.title = h1.textContent + ' — Projector';
            }

            buildNav();
            updateProgress(md);
            renderMermaid();
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ── Build sidebar nav from H2 headings ──
        function buildNav() {
            var headings = document.querySelectorAll('.md-content h2');
            var nav = document.getElementById('sidebar-nav');
            nav.innerHTML = '';
            headings.forEach(function (h, i) {
                // Generate/ensure ID
                if (!h.id) {
                    h.id = h.textContent.toLowerCase().replace(/[^\w\sáéíóúñü-]/g, '').replace(/\s+/g, '-').replace(/^-+|-+$/g, '');
                }
                var a = document.createElement('a');
                a.href = '#' + h.id;
                a.className = 'nav-item';
                a.dataset.section = h.id;
                var step = document.createElement('div');
                step.className = 'nav-step';
                step.id = 'nav-step-' + (i + 1);
                step.textContent = i + 1;
                a.appendChild(step);
                // Short label
                var label = h.textContent.replace(/^\d+\.\s*/, '');
                a.appendChild(document.createTextNode(label.length > 22 ? label.slice(0, 22) + '…' : label));
                nav.appendChild(a);
            });
            setupScrollTracking();
        }

        // ── Scroll tracking ──
        function setupScrollTracking() {
            var headings = document.querySelectorAll('.md-content h2');
            var navItems = document.querySelectorAll('.nav-item');
            if (!headings.length) return;
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (e) {
                    if (e.isIntersecting) {
                        navItems.forEach(function (n) { n.classList.remove('active'); });
                        var match = document.querySelector('.nav-item[data-section="' + e.target.id + '"]');
                        if (match) match.classList.add('active');
                    }
                });
            }, { rootMargin: '-10% 0px -80% 0px' });
            headings.forEach(function (h) { observer.observe(h); });
        }

        // ── Progress from PHASE markers ──
        function updateProgress(md) {
            var total = (md.match(/PHASE:[\w-]+:STATUS:/g) || []).length;
            var completed = (md.match(/STATUS:completed/g) || []).length;
            if (total === 0) total = 9;
            document.getElementById('progress-count').textContent = completed;
            document.getElementById('progress-bar').style.width = Math.round((completed / total) * 100) + '%';
            // Mark completed nav steps
            var phases = md.match(/PHASE:([\w-]+):STATUS:(\w+)/g) || [];
            phases.forEach(function (p, i) {
                if (p.indexOf('completed') > -1) {
                    var el = document.getElementById('nav-step-' + (i + 1));
                    if (el) { el.classList.add('completed'); el.textContent = '✓'; }
                }
            });
        }

        // ── Render Mermaid ──
        function renderMermaid() {
            var cur = document.body.classList.contains('light-mode') ? 'default' :
                document.body.classList.contains('soft-mode') ? 'default' : 'dark';
            mermaid.initialize({
                startOnLoad: false, theme: cur, securityLevel: 'loose',
                flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
                sequence: { useMaxWidth: true }, gantt: { useMaxWidth: true },
                er: { useMaxWidth: true }
            });
            // Reset and re-render
            document.querySelectorAll('.mermaid').forEach(function (el) {
                if (el.dataset.original) {
                    el.removeAttribute('data-processed');
                    el.innerHTML = el.dataset.original;
                } else {
                    el.dataset.original = el.textContent;
                }
            });
            try { mermaid.run(); } catch (e) { console.warn('Mermaid error:', e); }
        }

        // ── Diagram Fullscreen ──
        document.addEventListener('click', function (e) {
            var btn = e.target.closest('.diagram-expand');
            if (!btn) return;
            var wrapper = btn.closest('.mermaid-wrapper');
            var svg = wrapper.querySelector('svg');
            if (!svg) return;
            var overlay = document.createElement('div');
            overlay.className = 'diagram-fullscreen-overlay';
            overlay.innerHTML = '<span class="diagram-fullscreen-title">📊 Diagrama</span><button class="diagram-fullscreen-close">✕</button>';
            overlay.appendChild(svg.cloneNode(true));
            document.body.appendChild(overlay);
            var close = function () { overlay.remove(); };
            overlay.querySelector('.diagram-fullscreen-close').onclick = close;
            overlay.addEventListener('click', function (ev) { if (ev.target === overlay) close(); });
            document.addEventListener('keydown', function handler(ev) { if (ev.key === 'Escape') { close(); document.removeEventListener('keydown', handler); } });
        });

        // ── Comments System ──
        (function () {
            var menu = document.getElementById('ctx-menu');
            var popup = document.getElementById('comment-popup');
            var quote = document.getElementById('popup-quote');
            var textarea = document.getElementById('popup-textarea');
            var saveBtn = document.getElementById('popup-save');
            var cancelBtn = document.getElementById('popup-cancel');
            var toggleBtn = document.getElementById('toggle-comments');
            var panel = document.getElementById('comments-panel');
            var closeBtn = document.getElementById('close-comments');
            var list = document.getElementById('comments-list');
            var badge = document.getElementById('comment-count-badge');

            var STORAGE_KEY = 'projector-comments-' + location.pathname;
            var comments = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            var pendingCtx = null;

            function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

            // Context menu on right-click over content
            document.addEventListener('contextmenu', function (e) {
                var t = e.target.closest('.md-content');
                if (!t) return;
                var sel = window.getSelection().toString().trim();
                if (!sel) return;
                e.preventDefault();
                menu.style.left = Math.min(e.clientX, window.innerWidth - 220) + 'px';
                menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
                menu.classList.add('visible');
                pendingCtx = { text: sel, x: e.clientX, y: e.clientY };
            });

            document.addEventListener('click', function (e) {
                if (!e.target.closest('.ctx-menu')) menu.classList.remove('visible');
            });

            menu.addEventListener('click', function (e) {
                var item = e.target.closest('.ctx-item'); if (!item) return;
                var action = item.dataset.action;
                menu.classList.remove('visible');
                if (action === 'comment' && pendingCtx) {
                    quote.textContent = pendingCtx.text.slice(0, 150) + (pendingCtx.text.length > 150 ? '…' : '');
                    textarea.value = '';
                    popup.style.left = Math.min(pendingCtx.x, window.innerWidth - 360) + 'px';
                    popup.style.top = Math.min(pendingCtx.y + 10, window.innerHeight - 250) + 'px';
                    popup.classList.add('visible');
                    textarea.focus();
                } else if (action === 'copy' && pendingCtx) {
                    navigator.clipboard.writeText(pendingCtx.text);
                }
            });

            // Save comment
            function save() {
                var t = textarea.value.trim(); if (!t || !pendingCtx) return;
                comments.push({
                    id: Date.now(),
                    selectedText: pendingCtx.text,
                    comment: t,
                    phase: findPhase(pendingCtx.text),
                    date: new Date().toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
                });
                popup.classList.remove('visible');
                persist();
            }

            function findPhase(text) {
                // Find which H2 section the selected text belongs to
                var h2s = document.querySelectorAll('.md-content h2');
                for (var i = h2s.length - 1; i >= 0; i--) {
                    var section = h2s[i];
                    var nextH2 = h2s[i + 1];
                    var sectionText = '';
                    var el = section.nextElementSibling;
                    while (el && el !== nextH2) {
                        sectionText += el.textContent + ' ';
                        el = el.nextElementSibling;
                    }
                    if (sectionText.indexOf(text.slice(0, 30)) > -1) {
                        return section.textContent.replace(/^\d+\.\s*/, '');
                    }
                }
                return 'General';
            }

            function persist() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
                render();
            }

            function render() {
                badge.textContent = comments.length;
                if (!comments.length) {
                    list.innerHTML = '<div class="comments-empty">No hay comentarios aún.<br><small>Selecciona texto y haz clic derecho para comentar.</small></div>';
                    return;
                }
                list.innerHTML = comments.map(function (c, i) {
                    return '<div class="comment-card">' +
                        '<div class="comment-card-quote">' + esc(c.selectedText) + '</div>' +
                        '<div class="comment-card-text">' + esc(c.comment) + '</div>' +
                        '<div class="comment-card-meta"><span class="comment-card-phase">' + esc(c.phase) + '</span><span>' + c.date + '</span>' +
                        '<button class="comment-delete" data-idx="' + i + '" title="Eliminar">🗑</button></div></div>';
                }).join('');
            }

            saveBtn.onclick = save;
            cancelBtn.onclick = function () { popup.classList.remove('visible'); };
            textarea.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); save(); }
                if (e.key === 'Escape') popup.classList.remove('visible');
            });
            toggleBtn.onclick = function () { panel.classList.toggle('open'); };
            closeBtn.onclick = function () { panel.classList.remove('open'); };
            list.addEventListener('click', function (e) {
                var b = e.target.closest('.comment-delete');
                if (b) { comments.splice(+b.dataset.idx, 1); persist(); }
            });
            document.addEventListener('mousedown', function (e) {
                if (!e.target.closest('.comment-popup') && !e.target.closest('.ctx-menu')) popup.classList.remove('visible');
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') { menu.classList.remove('visible'); popup.classList.remove('visible'); }
            });

            render();
        })();

        // ── Live Auto-Reload ──
        (function () {
            var POLL_MS = 2000;
            var lastContent = window.__MD_CONTENT || '';
            var dot = document.querySelector('.live-dot');
            var hint = document.getElementById('refresh-hint');
            var isHttp = location.protocol.indexOf('http') === 0;

            if (!isHttp) {
                // file:// protocol — no auto-reload, show manual button
                hint.innerHTML = '⟲ Actualizar';
                hint.onclick = function () { location.reload(); };
                hint.title = 'Clic para recargar';
                return;
            }

            function poll() {
                fetch('technical-design.md', { cache: 'no-store' })
                    .then(function (r) { return r.ok ? r.text() : null; })
                    .then(function (md) {
                        if (!md || md === lastContent) return;
                        lastContent = md;
                        window.__MD_CONTENT = md;
                        // Save scroll
                        var scrollY = window.scrollY;
                        renderDocument();
                        window.scrollTo(0, scrollY);
                        // Flash indicator
                        dot.style.background = 'var(--accent-light)';
                        setTimeout(function () { dot.style.background = ''; }, 400);
                    })
                    .catch(function () { });
            }

            setInterval(poll, POLL_MS);
            hint.onclick = function () { poll(); };
        })();

        // ── Init ──
        renderDocument();
    </script>
</body>

</html>
