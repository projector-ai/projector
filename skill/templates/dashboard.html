<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projector — Gestor de Proyectos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a28;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --bg-glass: rgba(18, 18, 26, 0.85);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-medium: rgba(255, 255, 255, 0.1);
            --text-primary: #e8e8f0;
            --text-secondary: #8a8a9a;
            --text-muted: #55556a;
            --accent-primary: #6c5ce7;
            --accent-secondary: #a29bfe;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00d2a0;
            --warning: #ffa726;
            --gradient-accent: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(162, 155, 254, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 32px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .dashboard-header {
            margin-bottom: 48px;
        }

        .dashboard-logo {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 8px;
        }

        .dashboard-logo-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-accent);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 24px var(--accent-glow);
        }

        .dashboard-logo h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color var(--transition-fast);
        }

        .stat-card:hover {
            border-color: var(--border-medium);
        }

        .stat-icon {
            font-size: 24px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-secondary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        /* Project grid */
        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 28px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
            display: block;
        }

        .project-card:hover {
            border-color: rgba(108, 92, 231, 0.3);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-accent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .project-card-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .project-card-status {
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }

        .status-active {
            background: rgba(0, 210, 160, 0.1);
            color: var(--success);
        }

        .status-draft {
            background: rgba(85, 85, 106, 0.15);
            color: var(--text-muted);
        }

        .project-card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .project-card-progress {
            margin-bottom: 12px;
        }

        .project-card-progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }

        .project-card-progress-fill {
            height: 100%;
            background: var(--gradient-accent);
            border-radius: 2px;
            transition: width 0.4s;
        }

        .project-card-progress-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
        }

        .project-card-meta {
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 32px;
            background: var(--bg-card);
            border: 1px dashed var(--border-medium);
            border-radius: var(--radius-lg);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 400px;
            margin: 0 auto;
        }

        .empty-state code {
            display: inline-block;
            margin-top: 16px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-sm);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-secondary);
        }

        /* Create button */
        .btn-create {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--gradient-accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .btn-create:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 24px var(--accent-glow);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header .section-title {
            margin-bottom: 0;
        }

        .github-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .github-link:hover {
            color: var(--accent-secondary);
        }

        /* Footer */
        .dashboard-footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border-subtle);
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 4px;
        }

        /* Light mode */
        body.light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f8fa;
            --bg-tertiary: #f0f1f4;
            --bg-card: rgba(0, 0, 0, 0.02);
            --bg-card-hover: rgba(0, 0, 0, 0.04);
            --border-subtle: #e3e4e8;
            --border-medium: #d0d1d8;
            --text-primary: #1a1a2e;
            --text-secondary: #5a5a72;
            --text-muted: #8e8ea0;
            --accent-secondary: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.15);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        body.light-mode::before {
            display: none;
        }

        body.light-mode .empty-state code {
            background: #f0f0f5;
            color: #6c5ce7;
            border-color: #e3e4e8;
        }

        /* Soft mode (eye comfort) */
        body.soft-mode {
            --bg-primary: #f5f0e8;
            --bg-secondary: #ece7de;
            --bg-tertiary: #e4dfd5;
            --bg-card: rgba(124, 111, 94, 0.05);
            --bg-card-hover: rgba(124, 111, 94, 0.08);
            --border-subtle: #d5cfc4;
            --border-medium: #c5bfb4;
            --text-primary: #4a4237;
            --text-secondary: #6e6459;
            --text-muted: #9a8f82;
            --accent-secondary: #7c6f5e;
            --accent-glow: rgba(124, 111, 94, 0.15);
            --success: #6b8f71;
            --warning: #b5854a;
            --gradient-accent: linear-gradient(135deg, #7c6f5e, #a89880);
            --shadow-md: 0 4px 12px rgba(74, 66, 55, 0.08);
            --shadow-lg: 0 8px 24px rgba(74, 66, 55, 0.1);
        }

        body.soft-mode::before {
            display: none;
        }

        body.soft-mode .empty-state code {
            background: #ece7de;
            color: #7c6f5e;
            border-color: #d5cfc4;
        }

        #theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-medium);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: all 0.15s ease;
        }

        #theme-toggle:hover {
            transform: scale(1.1);
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="dashboard-header">
            <div class="dashboard-logo">
                <div class="dashboard-logo-icon">📐</div>
                <h1 id="org-title">Projector</h1>
            </div>
            <p class="dashboard-subtitle"><a id="github-link" class="github-link" href="#" target="_blank"></a> · Asistido por Antigravity</p>
        </header>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-card"><div class="stat-icon">📁</div><div><div class="stat-value" id="stat-total">0</div><div class="stat-label">Proyectos</div></div></div>
            <div class="stat-card"><div class="stat-icon">🚀</div><div><div class="stat-value" id="stat-active">0</div><div class="stat-label">Activos</div></div></div>
            <div class="stat-card"><div class="stat-icon">✅</div><div><div class="stat-value" id="stat-completed">0</div><div class="stat-label">Completados</div></div></div>
        </div>

        <div class="section-header">
            <div class="section-title">Proyectos</div>
            <button class="btn-create" id="btn-create" onclick="createProject()">➕ Nuevo Proyecto</button>
        </div>

        <div class="projects-grid" id="projects-grid"></div>

        <footer class="dashboard-footer">
            Projector · Generado con Antigravity · SDLC Workflow
        </footer>
    </div>
    <button id="theme-toggle" title="Cambiar tema">☀️</button>
    <script src="metadata.js"></script>
    <script>
        const btn=document.getElementById('theme-toggle');
        const themes=['dark','light','soft'],icons=['☀️','🌿','🌙'],cls=['','light-mode','soft-mode'];
        let cur=0;
        const stored=localStorage.getItem('projector-theme');
        if(stored==='light')cur=1;else if(stored==='soft')cur=2;
        function applyTheme(){document.body.classList.remove('light-mode','soft-mode');
          if(cls[cur])document.body.classList.add(cls[cur]);
          btn.textContent=icons[cur];localStorage.setItem('projector-theme',themes[cur]);}
        applyTheme();
        btn.onclick=function(){cur=(cur+1)%3;applyTheme();};

        function loadMetadata(){
          var data=window.__PROJECTOR_META;
          if(data){renderDashboard(data);}else{renderEmpty();}
        }
        function renderDashboard(data){
          document.getElementById('org-title').textContent=data.organization||'Projector';
          document.title=(data.organization||'Projector')+' — Projector';
          var ghLink=document.getElementById('github-link');
          if(data.github){ghLink.href=data.github;ghLink.textContent=data.github.replace('https://github.com/','@');}
          else{ghLink.textContent='Gestor de Proyectos';}
          var projects=data.projects||[];
          document.getElementById('stat-total').textContent=projects.length;
          document.getElementById('stat-active').textContent=projects.filter(function(p){return p.status==='active';}).length;
          document.getElementById('stat-completed').textContent=projects.filter(function(p){return p.status==='completed';}).length;
          var grid=document.getElementById('projects-grid');
          if(projects.length===0){renderEmpty();return;}
          grid.innerHTML=projects.map(function(p){
            var pct=p.phases>0?Math.round((p.phase/p.phases)*100):0;
            var sc=p.status==='completed'?'status-draft':'status-active';
            var st=p.status==='completed'?'Completado':'Activo';
            return '<a class="project-card" href="projects/'+p.name+'/technical-design.html">'
              +'<div class="project-card-header"><div class="project-card-title">'+p.name+'</div>'
              +'<span class="project-card-status '+sc+'">'+st+'</span></div>'
              +'<div class="project-card-desc">'+(p.description||'Sin descripción')+'</div>'
              +'<div class="project-card-progress"><div class="project-card-progress-bar">'
              +'<div class="project-card-progress-fill" style="width:'+pct+'%"></div></div>'
              +'<div class="project-card-progress-text">'+(p.phase||0)+' de '+(p.phases||9)+' fases</div></div>'
              +'<div class="project-card-meta"><span>📅 '+(p.created||'-')+'</span></div></a>';
          }).join('');
        }
        function renderEmpty(){
          document.getElementById('projects-grid').innerHTML='<div class="empty-state"><div class="empty-state-icon">📋</div>'
            +'<h3>Sin proyectos aún</h3>'
            +'<p>Crea tu primer proyecto con el botón de arriba o pídele al agente con <code>/software-design hub</code></p></div>';
        }
        function createProject(){
          var name=prompt('Nombre del proyecto:');
          if(!name)return;
          var desc=prompt('Descripción breve (opcional):')||'';
          var org=(window.__PROJECTOR_META&&window.__PROJECTOR_META.organization)||'org';
          alert('Pídele al agente de Antigravity que ejecute:\n\n/software-design hub\n\nNombre: '+name+'\nDescripción: '+desc+'\n\nEl agente ejecutará el comando de inicialización con tu autorización.');
        }
        loadMetadata();
    </script>
</body>
</html>
